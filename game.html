<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="./app.js" defer></script>
    <title>Tic Tac Toe - Game</title>
</head>

<body>
<nav class="navbar">
    <div class="nav-brand">🎮 Tic Tac Toe</div>
    <div class="nav-links">
        <a href="index.html" class="nav-link">New Game</a>
        <a href="game.html" class="nav-link active">Game</a>
        <a href="leaderboard.html" class="nav-link">Leaderboard</a>
    </div>
</nav>
<div class="index">
    <div class="gamePage">
        <div class="game-toolbar">
            <div class="control-group">
                <label for="modeSelect">Mod joc</label>
                <select id="modeSelect">
                    <option value="pvp">Player vs Player</option>
                    <option value="pvc">Player vs Computer</option>
                </select>
            </div>
            <div class="control-group">
                <label for="themeSelect">Temă</label>
                <select id="themeSelect">
                    <option value="theme-default">Default</option>
                    <option value="theme-classic">Classic</option>
                    <option value="theme-dark">Dark</option>
                </select>
            </div>
        </div>
        <div class="infoMessage">Rândul lui: <strong id="turn">X</strong> (<span id="playerName">Jucător X</span>)</div>
        <div class="grid" aria-label="Tic Tac Toe board">
            <div class="cell" data-i="0"></div>
            <div class="cell" data-i="1"></div>
            <div class="cell" data-i="2"></div>
            <div class="cell" data-i="3"></div>
            <div class="cell" data-i="4"></div>
            <div class="cell" data-i="5"></div>
            <div class="cell" data-i="6"></div>
            <div class="cell" data-i="7"></div>
            <div class="cell" data-i="8"></div>
        </div>
    </div>
</div>
</body>
</html>
