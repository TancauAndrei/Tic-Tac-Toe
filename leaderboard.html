<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="./leaderboard.js" defer></script>
    <title>Leaderboard - Tic Tac Toe</title>
</head>

<body>
<nav class="navbar">
    <div class="nav-brand">🎮 Tic Tac Toe</div>
    <div class="nav-links">
        <a href="index.html" class="nav-link">New Game</a>
        <a href="game.html" class="nav-link">Game</a>
        <a href="leaderboard.html" class="nav-link active">Leaderboard</a>
    </div>
</nav>
<div class="index">
    <div class="leaderboardPage">
        <div class="game-toolbar leaderboard-toolbar">
            <div class="control-group">
                <label for="leaderboardThemeSelect">Temă</label>
                <select id="leaderboardThemeSelect">
                    <option value="theme-default">Default</option>
                    <option value="theme-classic">Classic</option>
                    <option value="theme-dark">Dark</option>
                </select>
            </div>
        </div>

        <h1 class="leaderboard-title">Leaderboard</h1>

        <div class="leaderboard-container">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Wins</th>
                        <th>Losses</th>
                        <th>Draws</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                </tbody>
            </table>
        </div>

        <div class="leaderboard-actions">
            <button id="clearLeaderboardBtn" class="btn-clear" type="button">Clear Leaderboard</button>
        </div>
    </div>
</div>
</body>
</html>
